apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-collector
  labels:
    app: data-collector
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           
      maxUnavailable: 1  
  selector:
    matchLabels:
      app: data-collector
  template:
    metadata:
      labels:
        app: data-collector
    spec:
      runtimeClassName: nvidia
      
      containers:
      - name: data-collector
        image: ghcr.io/lemongooo/data-collector:latest
        

        command:
        - /bin/bash
        - -c
        - |
          echo "Data collector ready. Use 'kubectl exec' to run collection."
          sleep infinity
        
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "all"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32Gi"
          requests:
            nvidia.com/gpu: "1"
            memory: "16Gi"
        
        volumeMounts:
        - name: dataset
          mountPath: /root/Documents/t-ACT-ROS/dataset
        - name: dshm
          mountPath: /dev/shm
        
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
      
      hostIPC: true
      
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      
      volumes:
      - name: dataset
        persistentVolumeClaim:
          claimName: dataset-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
